openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage Omni Talos clusters and machines
    name: omni
    x-displayName: Omni Talos
servers:
  - url: /api
paths:
  /omni/{credentialID}/cluster/{name}:
    get:
      description: |-
        Retrieve details of an Omni cluster by name.
        **Access policy**: administrator
      operationId: OmniGetCluster
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Cluster name
          in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cluster details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/omni.getClusterResponse'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get an Omni cluster
      tags:
        - omni
  /omni/{credentialID}/cluster/{name}/upgrade/status/k8s:
    get:
      description: |-
        Retrieve the Kubernetes version upgrade status for the specified Omni cluster.
        **Access policy**: administrator
      operationId: OmniGetK8sVersionUpgradeStatus
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Cluster name
          in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Kubernetes upgrade status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/omni.upgradeStatusResponse'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get Kubernetes upgrade status for an Omni cluster
      tags:
        - omni
  /omni/{credentialID}/cluster/{name}/upgrade/status/talos:
    get:
      description: |-
        Retrieve the Talos version upgrade status for the specified Omni cluster.
        **Access policy**: administrator
      operationId: OmniGetTalosVersionUpgradeStatus
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Cluster name
          in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Talos upgrade status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/omni.upgradeStatusResponse'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get Talos upgrade status for an Omni cluster
      tags:
        - omni
  /omni/{credentialID}/cluster/create:
    post:
      description: |-
        Create a new Talos cluster via Omni using the provided cloud credential.
        **Access policy**: administrator
      operationId: OmniCreateCluster
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/omni.createClusterPayload'
        description: Cluster creation request
        required: true
      responses:
        '200':
          description: Created cluster environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Create an Omni cluster
      tags:
        - omni
  /omni/{credentialID}/cluster/delete:
    delete:
      description: |-
        Delete an Omni cluster by name.
        **Access policy**: administrator
      operationId: OmniDeleteCluster
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Cluster name
          in: query
          name: name
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Delete an Omni cluster
      tags:
        - omni
  /omni/{credentialID}/cluster/update:
    put:
      description: |-
        Update a cluster's Kubernetes version, Talos version, or node membership.
        **Access policy**: administrator
      operationId: OmniUpdateCluster
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/omni.updateClusterPayload'
        description: Cluster update request
        required: true
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Update an Omni cluster
      tags:
        - omni
  /omni/{credentialID}/cluster/version/talos:
    get:
      description: |-
        Retrieve all supported Talos versions and their compatible Kubernetes versions.
        **Access policy**: administrator
      operationId: OmniGetSupportedTalosVersions
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Map of Talos versions to compatible Kubernetes versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.TalosVersions'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get supported Talos versions
      tags:
        - omni
  /omni/{credentialID}/machine/{name}:
    get:
      description: |-
        Retrieve details of an Omni machine by name.
        **Access policy**: administrator
      operationId: OmniGetMachine
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Machine name
          in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Machine details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/omni.getMachineResponse'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get an Omni machine
      tags:
        - omni
  /omni/{credentialID}/machine/{name}/logs:
    get:
      description: |-
        Retrieve logs from an Omni machine by name.
        **Access policy**: administrator
      operationId: OmniGetMachineLogs
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Machine name
          in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Machine logs
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get logs for an Omni machine
      tags:
        - omni
  /omni/{credentialID}/machines:
    get:
      description: |-
        List machines registered in Omni, optionally filtered by cluster or availability.
        **Access policy**: administrator
      operationId: OmniListMachines
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Filter machines by cluster name
          in: query
          name: clusterName
          schema:
            type: string
        - description: Filter to show only available machines
          in: query
          name: isAvailable
          schema:
            type: boolean
      responses:
        '200':
          description: List of machines
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/omni.getMachineResponse'
                type: array
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: List Omni machines
      tags:
        - omni
  /omni/{credentialID}/node/{name}:
    post:
      description: |-
        Reboot a node in an Omni-managed Talos cluster.
        **Access policy**: administrator
      operationId: OmniRebootNode
      parameters:
        - description: Cloud credential identifier
          in: path
          name: credentialID
          required: true
          schema:
            type: integer
        - description: Node name
          in: path
          name: name
          required: true
          schema:
            type: string
        - description: Cluster name
          in: query
          name: cluster
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Reboot an Omni node
      tags:
        - omni
  /omni/serviceaccount/validate:
    get:
      description: |-
        Validate Omni service account credentials by testing connectivity to the Omni endpoint.
        **Access policy**: administrator
      operationId: OmniValidateServiceAccount
      parameters:
        - description: Omni endpoint URL (OMNI_ENDPOINT)
          in: query
          name: endpoint
          schema:
            type: string
        - description: Omni service account key (OMNI_SERVICE_ACCOUNT_KEY)
          in: query
          name: serviceAccountKey
          schema:
            type: string
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Validate an Omni service account
      tags:
        - omni
components:
  schemas:
    omni.getMachineResponse:
      properties:
        labels:
          additionalProperties:
            type: string
          type: object
        machineName:
          type: string
        spec:
          $ref: '#/components/schemas/omni.machineStatusSpec'
      type: object
    portaineree.TalosVersions:
      additionalProperties:
        items:
          type: string
        type: array
      type: object
    omni.updateClusterPayload:
      properties:
        cluster:
          $ref: '#/components/schemas/portaineree.OmniCluster'
        controlPlanesToAdd:
          $ref: '#/components/schemas/portaineree.OmniControlPlane'
        controlPlanesToRemove:
          items:
            type: string
          type: array
        workersToAdd:
          $ref: '#/components/schemas/portaineree.OmniWorker'
        workersToRemove:
          items:
            type: string
          type: array
      type: object
    portaineree.Endpoint:
      properties:
        Agent:
          $ref: '#/components/schemas/portaineree.EnvironmentAgentData'
        AuthorizedTeams:
          items:
            type: integer
          type: array
        AuthorizedUsers:
          description: Deprecated in DBVersion == 18
          items:
            type: integer
          type: array
        AzureCredentials:
          $ref: '#/components/schemas/portainer.AzureCredentials'
        ChangeWindow:
          allOf:
            - $ref: '#/components/schemas/portaineree.EndpointChangeWindow'
          description: GitOps update change window restriction for stacks and apps
        CloudProvider:
          allOf:
            - $ref: '#/components/schemas/portaineree.CloudProvider'
          description: |-
            A Kubernetes as a service cloud provider. Only included if this
            endpoint was created using KaaS provisioning.
        ComposeSyntaxMaxVersion:
          description: Maximum version of docker-compose
          example: '3.8'
          type: string
        ContainerEngine:
          description: ContainerEngine represents the container engine type. This can be 'docker' or 'podman' when interacting directly with these environmentes, otherwise '' for kubernetes environments.
          example: docker
          type: string
        DeploymentOptions:
          allOf:
            - $ref: '#/components/schemas/portaineree.DeploymentOptions'
          description: Hide manual deployment forms for an environment
        Edge:
          $ref: '#/components/schemas/portainer.EnvironmentEdgeSettings'
        EdgeCheckinInterval:
          description: The check in interval for edge agent (in seconds)
          example: 5
          type: integer
        EdgeID:
          description: The identifier of the edge agent associated with this environment(endpoint)
          type: string
        EdgeKey:
          description: The key which is used to map the agent to Portainer
          type: string
        EnableGPUManagement:
          type: boolean
        EnableImageNotification:
          type: boolean
        Gpus:
          items:
            $ref: '#/components/schemas/portainer.Pair'
          type: array
        GroupId:
          description: Environment(Endpoint) group identifier
          example: 1
          type: integer
        Heartbeat:
          description: Heartbeat indicates the heartbeat status of an edge environment
          example: true
          type: boolean
        Id:
          description: Environment(Endpoint) Identifier
          example: 1
          type: integer
        IsEdgeDevice:
          description: Deprecated v2.18
          type: boolean
        Kubernetes:
          allOf:
            - $ref: '#/components/schemas/portaineree.KubernetesData'
          description: Associated Kubernetes data
        LastCheckInDate:
          description: LastCheckInDate mark last check-in date on checkin
          format: int64
          type: integer
        LocalTimeZone:
          description: LocalTimeZone is the local time zone of the endpoint
          type: string
        MTLSStatus:
          $ref: '#/components/schemas/portaineree.MTLSStatus'
        Name:
          description: Environment(Endpoint) name
          example: my-environment
          type: string
        Policies:
          $ref: '#/components/schemas/portaineree.EndpointPolicies'
        PostInitMigrations:
          allOf:
            - $ref: '#/components/schemas/portaineree.EndpointPostInitMigrations'
          description: Whether we need to run any "post init migrations".
        PublicURL:
          description: URL or IP address where exposed containers will be reachable
          example: docker.mydomain.tld:2375
          type: string
        SecuritySettings:
          allOf:
            - $ref: '#/components/schemas/portainer.EndpointSecuritySettings'
          description: Environment(Endpoint) specific security settings
        Snapshots:
          description: List of snapshots
          items:
            $ref: '#/components/schemas/portainer.DockerSnapshot'
          type: array
        Status:
          allOf:
            - $ref: '#/components/schemas/portainer.EndpointStatus'
          description: The status of the environment(endpoint) (1 - up, 2 - down)
          example: 1
        StatusMessage:
          allOf:
            - $ref: '#/components/schemas/portaineree.EndpointStatusMessage'
          description: |-
            A message that describes the status. Should be included for Status 3
            or 4.
        TLS:
          description: |-
            Deprecated fields
            Deprecated in DBVersion == 4
          type: boolean
        TLSCACert:
          type: string
        TLSCert:
          type: string
        TLSConfig:
          $ref: '#/components/schemas/portainer.TLSConfiguration'
        TLSKey:
          type: string
        TagIds:
          description: List of tag identifiers to which this environment(endpoint) is associated
          items:
            type: integer
          type: array
        Tags:
          description: Deprecated in DBVersion == 22
          items:
            type: string
          type: array
        TeamAccessPolicies:
          allOf:
            - $ref: '#/components/schemas/portainer.TeamAccessPolicies'
          description: List of team identifiers authorized to connect to this environment(endpoint)
        Type:
          allOf:
            - $ref: '#/components/schemas/portainer.EndpointType'
          description: Environment(Endpoint) environment(endpoint) type. 1 for a Docker environment(endpoint), 2 for an agent on Docker environment(endpoint) or 3 for an Azure environment(endpoint).
          example: 1
        URL:
          description: URL or IP address of the Docker host associated to this environment(endpoint)
          example: docker.mydomain.tld:2375
          type: string
        UserAccessPolicies:
          allOf:
            - $ref: '#/components/schemas/portainer.UserAccessPolicies'
          description: List of user identifiers authorized to connect to this environment(endpoint)
        UserTrusted:
          description: Whether the device has been trusted or not by the user
          type: boolean
      type: object
    omni.createClusterPayload:
      properties:
        cluster:
          $ref: '#/components/schemas/portaineree.OmniCluster'
        clusterConfig:
          type: string
        controlPlane:
          $ref: '#/components/schemas/portaineree.OmniControlPlane'
        portainerUrl:
          type: string
        tunnelServerAddr:
          type: string
        worker:
          $ref: '#/components/schemas/portaineree.OmniWorker'
      type: object
    omni.upgradeStatusResponse:
      properties:
        current_upgrade_version:
          type: string
        error:
          type: string
        last_upgrade_version:
          type: string
        phase:
          type: integer
        status:
          type: string
        step:
          type: string
        upgrade_versions:
          items:
            type: string
          type: array
      type: object
    omni.getClusterResponse:
      properties:
        metadata:
          $ref: '#/components/schemas/omni.clusterSpec'
        status:
          $ref: '#/components/schemas/omni.clusterStatusSpec'
      type: object
    omni.machineStatusSpec:
      properties:
        cluster:
          type: string
        connected:
          type: boolean
        hardware:
          $ref: '#/components/schemas/omni.machineHardwareStatus'
        last_error:
          type: string
        maintenance:
          type: boolean
        management_address:
          type: string
        network:
          $ref: '#/components/schemas/omni.machineNetworkStatus'
        platform_metadata:
          $ref: '#/components/schemas/omni.machinePlatformMetadata'
        power_state:
          type: string
        role:
          type: string
        talos_version:
          type: string
      type: object
    portaineree.OmniWorker:
      properties:
        Kind:
          type: string
        Machines:
          items:
            $ref: '#/components/schemas/portaineree.OmniMachine'
          type: array
        Name:
          type: string
      type: object
    portaineree.OmniControlPlane:
      properties:
        Kind:
          type: string
        Machines:
          items:
            $ref: '#/components/schemas/portaineree.OmniMachine'
          type: array
      type: object
    portaineree.OmniCluster:
      properties:
        Kind:
          type: string
        Kubernetes:
          properties:
            Version:
              type: string
          type: object
        Labels:
          additionalProperties:
            type: string
          type: object
        Name:
          type: string
        Patches:
          items:
            $ref: '#/components/schemas/portaineree.OmniClusterPatch'
          type: array
        Talos:
          properties:
            Version:
              type: string
          type: object
      type: object
    portainer.UserAccessPolicies:
      additionalProperties:
        $ref: '#/components/schemas/portainer.AccessPolicy'
      type: object
    portainer.EndpointType:
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
      type: integer
      x-enum-varnames:
        - _
        - DockerEnvironment
        - AgentOnDockerEnvironment
        - AzureEnvironment
        - EdgeAgentOnDockerEnvironment
        - KubernetesLocalEnvironment
        - AgentOnKubernetesEnvironment
        - EdgeAgentOnKubernetesEnvironment
    portainer.TeamAccessPolicies:
      additionalProperties:
        $ref: '#/components/schemas/portainer.AccessPolicy'
      type: object
    portainer.TLSConfiguration:
      properties:
        TLS:
          description: Use TLS
          example: true
          type: boolean
        TLSCACert:
          description: Path to the TLS CA certificate file
          example: /data/tls/ca.pem
          type: string
        TLSCert:
          description: Path to the TLS client certificate file
          example: /data/tls/cert.pem
          type: string
        TLSKey:
          description: Path to the TLS client key file
          example: /data/tls/key.pem
          type: string
        TLSSkipVerify:
          description: Skip the verification of the server TLS certificate
          example: false
          type: boolean
      type: object
    portaineree.EndpointStatusMessage:
      properties:
        detail:
          type: string
        operation:
          description: |-
            TODO: in future versions, we should think about removing these fields and
            create a separate bucket to store cluster operation messages instead or try to find a better way.
            Operation/OperationStatus blank means, nothing is happening
          type: string
        operationStatus:
          allOf:
            - $ref: '#/components/schemas/portaineree.EndpointOperationStatus'
          description: ',processing,error'
        summary:
          type: string
        warnings:
          items:
            type: string
          type: array
      type: object
    portainer.EndpointStatus:
      enum:
        - 0
        - 1
        - 2
      type: integer
      x-enum-varnames:
        - _
        - EndpointStatusUp
        - EndpointStatusDown
    portainer.DockerSnapshot:
      properties:
        ContainerCount:
          type: integer
        DiagnosticsData:
          $ref: '#/components/schemas/portainer.DiagnosticsData'
        DockerSnapshotRaw:
          $ref: '#/components/schemas/portainer.DockerSnapshotRaw'
        DockerVersion:
          type: string
        GpuUseAll:
          type: boolean
        GpuUseList:
          items:
            type: string
          type: array
        HealthyContainerCount:
          type: integer
        ImageCount:
          type: integer
        IsPodman:
          type: boolean
        NodeCount:
          type: integer
        PerformanceMetrics:
          $ref: '#/components/schemas/portainer.PerformanceMetrics'
        RunningContainerCount:
          type: integer
        ServiceCount:
          type: integer
        StackCount:
          type: integer
        StoppedContainerCount:
          type: integer
        Swarm:
          type: boolean
        Time:
          type: integer
        TotalCPU:
          type: integer
        TotalMemory:
          type: integer
        UnhealthyContainerCount:
          type: integer
        VolumeCount:
          type: integer
      type: object
    portainer.EndpointSecuritySettings:
      properties:
        allowBindMountsForRegularUsers:
          description: Whether non-administrator should be able to use bind mounts when creating containers
          example: false
          type: boolean
        allowContainerCapabilitiesForRegularUsers:
          description: Whether non-administrator should be able to use container capabilities
          example: true
          type: boolean
        allowDeviceMappingForRegularUsers:
          description: Whether non-administrator should be able to use device mapping
          example: true
          type: boolean
        allowHostNamespaceForRegularUsers:
          description: Whether non-administrator should be able to use the host pid
          example: true
          type: boolean
        allowPrivilegedModeForRegularUsers:
          description: Whether non-administrator should be able to use privileged mode when creating containers
          example: false
          type: boolean
        allowSecurityOptForRegularUsers:
          description: Whether non-administrator should be able to use security-opt settings
          example: true
          type: boolean
        allowStackManagementForRegularUsers:
          description: Whether non-administrator should be able to manage stacks
          example: true
          type: boolean
        allowSysctlSettingForRegularUsers:
          description: Whether non-administrator should be able to use sysctl settings
          example: true
          type: boolean
        allowVolumeBrowserForRegularUsers:
          description: Whether non-administrator should be able to browse volumes
          example: true
          type: boolean
        enableHostManagementFeatures:
          description: Whether host management features are enabled
          example: true
          type: boolean
      type: object
    portaineree.EndpointPostInitMigrations:
      properties:
        MigrateGPUs:
          type: boolean
        MigrateGateKeeper:
          type: boolean
        MigrateIngresses:
          type: boolean
        MigrateRegistrySASecrets:
          type: boolean
        MigrateSecretOwners:
          type: boolean
      type: object
    portaineree.EndpointPolicies:
      properties:
        changeConfirmationPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        dockerRBACPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        dockerRegistryPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        dockerSecurityPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        dockerSetupPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        k8sRBACPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        k8sRegistryPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        k8sSecurityPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
        k8sSetupPolicy:
          $ref: '#/components/schemas/portaineree.AppliedPolicy'
      type: object
    portaineree.MTLSStatus:
      properties:
        enabled:
          type: boolean
        ok:
          type: boolean
      type: object
    portaineree.KubernetesData:
      properties:
        Configuration:
          $ref: '#/components/schemas/portaineree.KubernetesConfiguration'
        Flags:
          $ref: '#/components/schemas/portainer.KubernetesFlags'
        Snapshots:
          items:
            $ref: '#/components/schemas/portainer.KubernetesSnapshot'
          type: array
      type: object
    portainer.Pair:
      properties:
        name:
          example: name
          type: string
        value:
          example: value
          type: string
      type: object
    portainer.EnvironmentEdgeSettings:
      properties:
        AsyncMode:
          description: Whether the device has been started in edge async mode
          type: boolean
        CommandInterval:
          description: The command list interval for edge agent - used in edge async mode [seconds]
          example: 60
          type: integer
        PingInterval:
          description: The ping interval for edge agent - used in edge async mode [seconds]
          example: 60
          type: integer
        SnapshotInterval:
