openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage team memberships
    name: team_memberships
    x-displayName: Team memberships
servers:
  - url: /api
paths:
  /team_memberships:
    get:
      description: |-
        List team memberships. Access is only available to administrators and team leaders.
        **Access policy**: administrator
      operationId: TeamMembershipList
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/portainer.TeamMembership'
                type: array
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: List team memberships
      tags:
        - team_memberships
    post:
      description: |-
        Create a new team memberships. Access is only available to administrators leaders of the associated team.
        **Access policy**: administrator
      operationId: TeamMembershipCreate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/teammemberships.teamMembershipCreatePayload'
        description: Team membership details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portainer.TeamMembership'
        '400':
          description: Invalid request
        '403':
          description: Permission denied to manage memberships
        '409':
          description: Team membership already registered
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create a new team membership
      tags:
        - team_memberships
  /team_memberships/{id}:
    delete:
      description: |-
        Remove a team membership. Access is only available to administrators leaders of the associated team.
        **Access policy**: administrator
      operationId: TeamMembershipDelete
      parameters:
        - description: TeamMembership identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: TeamMembership not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Remove a team membership
      tags:
        - team_memberships
    put:
      description: |-
        Update a team membership. Access is only available to administrators or leaders of the associated team.
        **Access policy**: administrator or leaders of the associated team
      operationId: TeamMembershipUpdate
      parameters:
        - description: Team membership identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/teammemberships.teamMembershipUpdatePayload'
        description: Team membership details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portainer.TeamMembership'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: TeamMembership not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update a team membership
      tags:
        - team_memberships
  /teams/{id}/memberships:
    get:
      description: |-
        List team memberships. Access is only available to administrators and team leaders.
        **Access policy**: restricted
      operationId: TeamMemberships
      parameters:
        - description: Team Id
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/portainer.TeamMembership'
                type: array
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: List team memberships
      tags:
        - team_memberships
components:
  schemas:
    portainer.TeamMembership:
      properties:
        Id:
          description: Membership Identifier
          example: 1
          type: integer
        Role:
          allOf:
            - $ref: '#/components/schemas/portainer.MembershipRole'
          description: Team role (1 for team leader and 2 for team member)
          example: 1
        TeamID:
          description: Team identifier
          example: 1
          type: integer
        UserID:
          description: User identifier
          example: 1
          type: integer
      type: object
    teammemberships.teamMembershipUpdatePayload:
      properties:
        Role:
          description: Role for the user inside the team (1 for leader and 2 for regular member)
          enum:
            - 1
            - 2
          example: 1
          type: integer
        TeamID:
          description: Team identifier
          example: 1
          type: integer
        UserID:
          description: User identifier
          example: 1
          type: integer
      required:
        - Role
        - TeamID
        - UserID
      type: object
    teammemberships.teamMembershipCreatePayload:
      properties:
        Role:
          description: Role for the user inside the team (1 for leader and 2 for regular member)
          enum:
            - 1
            - 2
          example: 1
          type: integer
        TeamID:
          description: Team identifier
          example: 1
          type: integer
        UserID:
          description: User identifier
          example: 1
          type: integer
      required:
        - Role
        - TeamID
        - UserID
      type: object
    portainer.MembershipRole:
      enum:
        - 0
        - 1
        - 2
      type: integer
      x-enum-varnames:
        - _
        - TeamLeader
        - TeamMember
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: X-API-KEY
      type: apiKey
    jwt:
      in: header
      name: Authorization
      type: apiKey
