      operationId: GetAllKubernetesConfigMaps
      parameters:
        - description: Environment identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Set to true to include information about applications that use the ConfigMaps in the response
          in: query
          name: isUsed
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
