openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage Kubernetes cluster
    name: kubernetes
    x-displayName: Kubernetes management
servers:
  - url: /api
paths:
  /kubernetes/{environmentId}/opa:
    get:
      description: |-
        Get Pod Security Rule within k8s cluster
        **Access policy**: authenticated
      operationId: getKubernetesPodSecurityRule
      parameters:
        - description: Environment identifier
          in: path
          name: environmentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/podsecurity.PodSecurityRule'
        '400':
          description: Invalid request
        '404':
          description: Endpoint not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Get Pod Security Rule within k8s cluster, if not found, the frontend will create a default
      tags:
        - kubernetes
    put:
      description: |-
        Update Pod Security Rule within k8s cluster
        **Access policy**: authenticated
      operationId: updateK8sPodSecurityRule
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: environmentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '404':
          description: Pod Security Rule not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update Pod Security Rule within k8s cluster
      tags:
        - kubernetes
  /kubernetes/{id}/applications:
    get:
      description: |-
        Get a list of applications across all namespaces in the cluster. If the nodeName is provided, it will return the applications running on that node.
        **Access policy**: authenticated
      operationId: GetAllKubernetesApplications
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Namespace name
          in: query
          name: namespace
          required: true
          schema:
            type: string
        - description: Node name
          in: query
          name: nodeName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/models.K8sApplication'
                type: array
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get a list of applications across all namespaces in the cluster. If the nodeName is provided, it will return the applications running on that node.
      tags:
        - kubernetes
  /kubernetes/{id}/applications/count:
    get:
      description: |-
        Get the count of Applications across all namespaces in the cluster. If the nodeName is provided, it will return the count of applications running on that node.
        **Access policy**: Authenticated user.
      operationId: getAllKubernetesApplicationsCount
      parameters:
        - description: Environment identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: integer
        '400':
          description: Invalid request payload, such as missing required fields or fields not meeting validation criteria.
        '403':
          description: Unauthorized access or operation not allowed.
        '500':
          description: Server error occurred while attempting to retrieve the count of all applications from the cluster.
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get Applications count
      tags:
        - kubernetes
  /kubernetes/{id}/cluster_role_bindings/delete:
    post:
      description: |-
        Delete the provided list of cluster role bindings.
        **Access policy**: Authenticated user.
      operationId: DeleteClusterRoleBindings
      parameters:
        - description: Environment identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: A list of cluster role bindings to delete
        required: true
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request payload, such as missing required fields or fields not meeting validation criteria.
        '401':
          description: Unauthorized access - the user is not authenticated or does not have the necessary permissions. Ensure that you have provided a valid API key or JWT token, and that you have the required permissions.
        '403':
          description: Permission denied - the user is authenticated but does not have the necessary permissions to access the requested resource or perform the specified operation. Check your user roles and permissions.
        '404':
          description: Unable to find an environment with the specified identifier or unable to find a specific cluster role binding.
        '500':
          description: Server error occurred while attempting to delete cluster role bindings.
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Delete cluster role bindings
      tags:
        - kubernetes
