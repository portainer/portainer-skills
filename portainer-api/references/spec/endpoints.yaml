        - AlertRuleStatePending
        - AlertRuleStateFiring
    network.EndpointSettings:
      properties:
        Aliases:
          description: Aliases holds the list of extra, user-specified DNS names for this endpoint.
          items:
            type: string
          type: array
        DNSNames:
          description: |-
            DNSNames holds all the (non fully qualified) DNS names associated to this endpoint. First entry is used to
            generate PTR records.
          items:
            type: string
          type: array
        DriverOpts:
          additionalProperties:
            type: string
          type: object
        EndpointID:
          type: string
        Gateway:
          type: string
        GlobalIPv6Address:
          type: string
        GlobalIPv6PrefixLen:
          type: integer
        GwPriority:
          description: |-
            GwPriority determines which endpoint will provide the default gateway
            for the container. The endpoint with the highest priority will be used.
            If multiple endpoints have the same priority, they are lexicographically
            sorted based on their network name, and the one that sorts first is picked.
          type: integer
        IPAMConfig:
          allOf:
            - $ref: '#/components/schemas/network.EndpointIPAMConfig'
          description: Configurations
        IPAddress:
          type: string
        IPPrefixLen:
          type: integer
        IPv6Gateway:
          type: string
        Links:
          items:
            type: string
          type: array
        MacAddress:
          description: |-
            MacAddress may be used to specify a MAC address when the container is created.
            Once the container is running, it becomes operational data (it may contain a
            generated address).
          type: string
        NetworkID:
          description: Operational data
          type: string
      type: object
    mount.Type:
      enum:
