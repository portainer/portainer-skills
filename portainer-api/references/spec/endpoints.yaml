openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage Docker resources
    name: docker
    x-displayName: Docker resources
  - description: Manage environments
    name: endpoints
    x-displayName: Environments
servers:
  - url: /api
paths:
  /docker/{environmentId}/snapshot:
    get:
      description: '**Access policy**:'
      operationId: snapshotInspect
      parameters:
        - description: Environment identifier
          in: path
          name: environmentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portainer.DockerSnapshotRaw'
        '404':
          description: Environment not found
      security:
        - jwt: []
      summary: Fetch latest snapshot of environment
      tags:
        - endpoints
        - docker
  /docker/{environmentId}/snapshot/containers:
    get:
      description: '**Access policy**:'
      operationId: snapshotContainersList
      parameters:
        - description: Environment identifier
          in: path
          name: environmentId
          required: true
          schema:
            type: integer
        - description: Edge stack identifier, will return only containers for this edge stack
          in: query
          name: edgeStackId
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portainer.DockerContainerSnapshot'
        '404':
          description: Environment not found
      security:
        - jwt: []
      summary: Fetch containers list from a snapshot
      tags:
        - endpoints
        - docker
  /docker/{environmentId}/snapshot/containers/{containerId}:
    get:
      description: '**Access policy**:'
      operationId: snapshotContainerInspect
      parameters:
        - description: Environment identifier
          in: path
          name: environmentId
          required: true
          schema:
            type: integer
        - description: Container identifier
          in: path
          name: containerId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portainer.DockerContainerSnapshot'
        '404':
          description: Environment not found
      security:
        - jwt: []
      summary: Fetch container from a snapshot
      tags:
        - endpoints
        - docker
  /endpoints:
    delete:
      deprecated: true
      description: |-
        Deprecated: use the `POST` endpoint instead.
        Remove multiple environments and optionally clean-up associated resources.
        **Access policy**: Administrator only.
      operationId: EndpointDeleteBatchDeprecated
      requestBody:
        $ref: '#/components/requestBodies/endpoints.endpointDeleteBatchPayload'
      responses:
        '204':
          description: Environment(s) successfully deleted.
        '207':
          description: Partial success. Some environments were deleted successfully, while others failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/endpoints.endpointDeleteBatchPartialResponse'
        '400':
          description: Invalid request payload, such as missing required fields or fields not meeting validation criteria.
        '403':
          description: Unauthorized access or operation not allowed.
        '500':
          description: Server error occurred while attempting to delete the specified environments.
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Remove multiple environments
      tags:
        - endpoints
    get:
      description: |-
        List all environments(endpoints) based on the current user authorizations. Will
        return all environments(endpoints) if using an administrator or team leader account otherwise it will
        only return authorized environments(endpoints).
        **Access policy**: restricted
      operationId: EndpointList
      parameters:
        - description: Start searching from
          in: query
          name: start
          schema:
            type: integer
        - description: Limit results to this value
          in: query
          name: limit
          schema:
            type: integer
        - description: Sort results by this value
          in: query
          name: sort
          schema:
            type: string
            enum:
              - Name
              - Group
              - Status
              - LastCheckIn
              - EdgeID
              - PlatformType
              - Health
              - Id
        - description: Order sorted results by desc/asc
          in: query
          name: order
          schema:
            type: integer
        - description: If true, an `X-Update-Available` header will be added to the response to indicate if an update is available
          in: query
          name: updateInformation
          schema:
            type: boolean
        - description: If true, an `X-K8S-Env-Admin` header will be added to the response to indicate if the user is a K8S environment admin for any of the returned environments
          in: query
          name: k8sEnvAdmin
          schema:
            type: boolean
        - description: Search query
          in: query
          name: search
          schema:
            type: string
        - description: List environments(endpoints) of these groups
          in: query
          name: groupIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: List environments(endpoints) by this status
          in: query
          name: status
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: List environments(endpoints) of this type
          in: query
          name: types
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: search environments(endpoints) with these tags (depends on tagsPartialMatch)
          in: query
          name: tagIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: If true, will return environment(endpoint) which has one of tagIds, if false (or missing) will return only environments(endpoints) that has all the tags
          in: query
          name: tagsPartialMatch
          schema:
            type: boolean
        - description: will return only these environments(endpoints)
          in: query
          name: endpointIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: will exclude these environments(endpoints)
          in: query
          name: excludeIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: If true, will return environment(endpoint) that were provisioned
          in: query
          name: provisioned
          schema:
            type: boolean
        - description: will return only environments with on of these agent versions
          in: query
          name: agentVersions
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: if exists true show only edge async agents, false show only standard edge agents. if missing, will show both types (relevant only for edge agents)
          in: query
          name: edgeAsync
          schema:
            type: boolean
        - description: if true, show only untrusted edge agents, if false show only trusted edge agents (relevant only for edge agents)
          in: query
          name: edgeDeviceUntrusted
          schema:
            type: boolean
        - description: if bigger then zero, show only edge agents that checked-in in the last provided seconds (relevant only for edge agents)
          in: query
          name: edgeCheckInPassedSeconds
          schema:
            type: number
        - description: if true, the snapshot data won't be retrieved
          in: query
          name: excludeSnapshots
          schema:
            type: boolean
        - description: will return only environments(endpoints) with this name
          in: query
          name: name
          schema:
            type: string
        - description: Filter environments by partial name match (case-insensitive, searches name only)
          in: query
          name: nameFilter
          schema:
            type: string
        - description: only applied when edgeStackId exists. Filter the returned environments based on their deployment status in the stack (not the environment status!)
          in: query
          name: edgeStackStatus
          schema:
            type: string
        - description: List environments(endpoints) of these edge groups
          in: query
          name: edgeGroupIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: Exclude environments(endpoints) of these edge groups
          in: query
          name: excludeEdgeGroupIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: If true, will apply policy data to the returned environments(endpoints)
          in: query
          name: policy
          schema:
            type: boolean
        - description: List environments(endpoints) associated with these policies
          in: query
          name: policyIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - description: Filter environments by policy status (applied, failed, in_progress, warning, not_supported). Only applies when policyIds is specified.
          in: query
          name: policyStatus
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Endpoints
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/portaineree.Endpoint'
                type: array
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: List environments(endpoints)
      tags:
        - endpoints
    post:
      description: |-
        Create a new environment(endpoint) that will be used to manage an environment(endpoint).
        **Access policy**: administrator
      operationId: EndpointCreate
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Name:
                  description: 'Name that will be used to identify this environment(endpoint) (example: my-environment)'
                  type: string
                EndpointCreationType:
                  description: 'Environment(Endpoint) type. Value must be one of: 1 (Local Docker environment), 2 (Agent environment), 3 (Azure environment), 4 (Edge agent environment) or 5 (Local Kubernetes Environment)'
                  type: integer
                ContainerEngine:
                  description: 'Container engine used by the environment(endpoint). Value must be one of: ''docker'' or ''podman'''
                  type: string
                URL:
                  description: 'URL or IP address of a Docker host (example: docker.mydomain.tld:2375). Defaults to local if not specified (Linux: /var/run/docker.sock, Windows: //./pipe/docker_engine). Cannot be empty if EndpointCreationType is set to 4 (Edge agent environment)'
                  type: string
                PublicURL:
                  description: 'URL or IP address where exposed containers will be reachable. Defaults to URL if not specified (example: docker.mydomain.tld:2375)'
                  type: string
                GroupID:
                  description: Environment(Endpoint) group identifier. If not specified will default to 1 (unassigned).
                  type: integer
                TLS:
                  description: Require TLS to connect against this environment(endpoint). Must be true if EndpointCreationType is set to 2 (Agent environment)
                  type: boolean
                TLSSkipVerify:
                  description: Skip server verification when using TLS. Must be true if EndpointCreationType is set to 2 (Agent environment)
                  type: boolean
                TLSSkipClientVerify:
                  description: Skip client verification when using TLS. Must be true if EndpointCreationType is set to 2 (Agent environment)
                  type: boolean
                TLSCACertFile:
                  description: TLS CA certificate file
                  type: string
                  format: binary
                TLSCertFile:
                  description: TLS client certificate file
                  type: string
                  format: binary
                TLSKeyFile:
                  description: TLS client key file
                  type: string
                  format: binary
                AzureApplicationID:
                  description: Azure application ID. Required if environment(endpoint) type is set to 3
                  type: string
                AzureTenantID:
                  description: Azure tenant ID. Required if environment(endpoint) type is set to 3
                  type: string
                AzureAuthenticationKey:
                  description: Azure authentication key. Required if environment(endpoint) type is set to 3
                  type: string
                TagIds:
                  description: List of tag identifiers to which this environment(endpoint) is associated
                  type: array
                  items:
                    type: integer
                EdgeCheckinInterval:
                  description: The check in interval for edge agent (in seconds)
                  type: integer
                EdgeTunnelServerAddress:
                  description: URL or IP address that will be used to establish a reverse tunnel. Required when settings.EnableEdgeComputeFeatures is set to false or when settings.Edge.TunnelServerAddress is not set
                  type: string
                EdgeAsyncMode:
                  description: Enable async mode for edge agent
                  type: boolean
                Gpus:
                  description: List of GPUs - json stringified array of {name, value} structs
                  type: string
              required:
                - Name
                - EndpointCreationType
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '409':
          description: Name is not unique
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create a new environment(endpoint)
      tags:
        - endpoints
  /endpoints/{id}:
    delete:
      description: |-
        Remove the environment associated to the specified identifier and optionally clean-up associated resources.
        **Access policy**: Administrator only.
      operationId: EndpointDelete
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Environment successfully deleted.
        '400':
          description: Invalid request payload, such as missing required fields or fields not meeting validation criteria.
        '403':
          description: Unauthorized access or operation not allowed.
        '404':
          description: Unable to find the environment with the specified identifier inside the database.
        '500':
          description: Server error occurred while attempting to delete the environment.
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Remove an environment
      tags:
        - endpoints
    get:
      description: |-
        Retrieve details about an environment(endpoint).
        **Access policy**: restricted
      operationId: EndpointInspect
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: if true, the snapshot data won't be retrieved
          in: query
          name: excludeSnapshot
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Inspect an environment(endpoint)
      tags:
        - endpoints
    put:
      description: |-
        Update an environment(endpoint).
        **Access policy**: authenticated
      operationId: EndpointUpdate
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/endpoints.endpointUpdatePayload'
        description: Environment(Endpoint) details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '404':
          description: Environment(Endpoint) not found
        '409':
          description: Name is not unique
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update an environment(endpoint)
      tags:
        - endpoints
  /endpoints/{id}/association:
    put:
      description: |-
        De-association an edge environment(endpoint).
        **Access policy**: administrator
      operationId: EndpointAssociationDelete
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: De-association an edge environment(endpoint)
      tags:
        - endpoints
  /endpoints/{id}/docker/v2/browse/put:
    post:
      description: |-
        Use this environment(endpoint) to upload TLS files.
        **Access policy**: administrator
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Optional volume identifier to upload the file
          in: query
          name: volumeID
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Path:
                  description: The destination path to upload the file to
                  type: string
                file:
                  description: The file to upload
                  type: string
                  format: binary
              required:
                - Path
                - file
        required: true
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Upload a file under a specific path on the file system of an environment (endpoint)
      tags:
        - endpoints
  /endpoints/{id}/dockerhub/{registryId}:
    get:
      description: |-
        get docker pull limits for a docker hub registry in the environment
        **Access policy**:
      operationId: endpointDockerhubStatus
      parameters:
        - description: endpoint ID
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: registry ID
          in: path
          name: registryId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/endpoints.dockerhubStatusResponse'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: registry or endpoint not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: fetch docker pull limits
      tags:
        - endpoints
  /endpoints/{id}/edge/alerts/state:
    get:
      description: |-
        Returns the latest alert rule evaluation state reported by an edge agent
        **Access policy**: authenticated
      operationId: EndpointEdgeAlertState
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/metrics.EdgeAlertState'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Get edge agent alert evaluation state
      tags:
        - endpoints
  /endpoints/{id}/edge/charts:
    get:
      description: |-
        environment(endpoint) for edge agent to get contents of requested Helm charts environment(endpoint)
        **Access policy**: restricted only to Edge environments(endpoints)
      operationId: EndpointGetCharts
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: JSON encoded list of charts to install
          in: query
          name: chartNames
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/endpointedge.endpointGetChartsResponse'
        '400':
          description: Invalid request
        '403':
          description: Permission denied to access environment(endpoint)
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Get environment(endpoint) charts to install
      tags:
        - endpoints
  /endpoints/{id}/edge/charts/statuses:
    put:
      description: |-
        environment(endpoint) for edge agent to report back installation statuses of Helm charts
        **Access policy**: restricted only to Edge environments(endpoints)
      operationId: EndpointUpdateChartStatuses
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Permission denied to access environment(endpoint)
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update environment(endpoint) policy chart installation statuses
      tags:
        - endpoints
  /endpoints/{id}/edge/status:
    get:
      description: |-
        environment(endpoint) for edge agent to check status of environment(endpoint)
        **Access policy**: restricted only to Edge environments(endpoints)
      operationId: EndpointEdgeStatusInspect
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/endpointedge.endpointEdgeStatusInspectResponse'
        '400':
          description: Invalid request
        '403':
          description: Permission denied to access environment(endpoint)
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Get environment(endpoint) status
      tags:
        - endpoints
  /endpoints/{id}/forceupdateservice:
    put:
      description: |-
        force update a docker service
        **Access policy**: authenticated
      operationId: endpointForceUpdateService
      parameters:
        - description: endpoint identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/endpoints.forceUpdateServicePayload'
        description: details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/swarm.ServiceUpdateResponse'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: endpoint not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: force update a docker service
      tags:
        - endpoints
  /endpoints/{id}/mtls_certificate:
    get:
      description: |-
        Retrieve the mTLS certificate of an environment(endpoint).
        **Access policy**: administrator
      operationId: EndpointMTLSCertificate
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/endpoints.endpointMTLSCertResponse'
        '400':
          description: Invalid request
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Get an environment(endpoint) mTLS certificate
      tags:
        - endpoints
  /endpoints/{id}/mtls_certificate_error:
    get:
      description: |-
        Retrieve the mTLS certificate of an environment(endpoint).
        **Access policy**: administrator
      operationId: EndpointMTLSAgentCertificateError
      parameters:
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/endpoints.endpointMTLSCertResponse'
        '400':
          description: Invalid request
        '404':
          description: Environment(Endpoint) not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Get an agent(endpoint) mTLS certificate
      tags:
        - endpoints
  /endpoints/{id}/pools/{rpn}/access:
    put:
      description: |-
        Update the access permissions on a namespace in the given environment. This endpoint allows adding or removing users and teams that can access the specified namespace. Please note that users or teams must be added to the environment before they can be added to the namespace.
        **Access policy**: Restricted. User must be an administrator or have appropriate permissions to modify namespace access.
      operationId: namespacesAccessUpdate
      parameters:
        - description: Environment identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Namespace identifier
          in: path
          name: rpn
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/endpoints.resourcePoolUpdatePayload'
        description: Payload containing lists of users and teams to add or remove access for
        required: true
      responses:
        '204':
          description: Success - Access permissions were successfully updated
        '400':
          description: Invalid request payload, such as missing required fields or fields not meeting validation criteria.
        '403':
          description: Permission denied - the user is authenticated but does not have the necessary permissions to access the requested resource or perform the specified operation. Check your user roles and permissions.
        '404':
          description: Unable to find an environment with the specified identifier.
        '500':
          description: Server error occurred while attempting to update namespace access permissions.
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Update namespace access for a given namespace
      tags:
        - endpoints
  /endpoints/{id}/registries:
    get:
      description: |-
        List all registries based on the current user authorizations in current environment.
        **Access policy**: authenticated
      operationId: endpointRegistriesList
      parameters:
        - description: required if kubernetes environment, will show registries by namespace
          in: query
          name: namespace
          schema:
            type: string
        - description: Environment(Endpoint) identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
