openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage cloud credentials
    name: cloud_credentials
    x-displayName: Cloud credentials
servers:
  - url: /api
paths:
  /cloud/credentials:
    get:
      description: |-
        getAll cloud credential
        **Access policy**: authenticated
      operationId: getAll
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: getAll cloud credentials
      tags:
        - cloud_credentials
    post:
      description: |-
        Create a cloud credential
        **Access policy**: authenticated
      operationId: Create
      requestBody:
        $ref: '#/components/requestBodies/Create'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create a cloud credential
      tags:
        - cloud_credentials
  /cloud/credentials/{id}:
    delete:
      description: |-
        Delete a cloud credential
        **Access policy**: authenticated
      operationId: cloudCredsDelete
      parameters:
        - description: ID of the cloud credential
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '403':
          description: 'Forbidden: the requested credential is associated with endpoint(s)'
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Delete a cloud credential
      tags:
        - cloud_credentials
    get:
      description: |-
        getByID gets a cloud credential by ID
        **Access policy**: authenticated
      operationId: cloudCredsGetByID
      parameters:
        - description: ID of the cloud credential
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: getByID gets a cloud credential by ID
      tags:
        - cloud_credentials
    put:
      description: |-
        Update a cloud credential
        **Access policy**: authenticated
      operationId: cloudCredsUpdate
      parameters:
        - description: ID of the cloud credential
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        $ref: '#/components/requestBodies/Create'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update a cloud credential
      tags:
        - cloud_credentials
  /cloud/gitcredentials:
    get:
      description: |-
        Get shared git credentials
        **Access policy**: Administrator only.
      operationId: SharedGitGetAll
      responses:
        '201':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get Shared Git Credentials
      tags:
        - cloud_credentials
    post:
      description: |-
        Create a shared git credential
        **Access policy**: Administrator only.
      operationId: SharedGitCreate
      responses:
        '201':
          description: Success
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Create Shared Git Credential
      tags:
        - cloud_credentials
  /cloud/gitcredentials/{id}:
    delete:
      description: |-
        Delete a shared git credential
        **Access policy**: Administrator only.
      operationId: SharedGitDelete
      responses:
        '201':
          description: Success
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Delete Shared Git Credential
      tags:
        - cloud_credentials
    get:
      description: |-
        Get a shared git credential
        **Access policy**: Administrator only.
      operationId: SharedGitGet
      responses:
        '201':
          description: Success
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Get Shared Git Credential
      tags:
        - cloud_credentials
    put:
      description: |-
        Update a shared git credential
        **Access policy**: Administrator only.
      operationId: SharedGitUpdate
      responses:
        '201':
          description: Success
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
          jwt: []
      summary: Update a Shared Git Credential
      tags:
        - cloud_credentials
  /sshkeygen:
    post:
      description: |-
        Generate an ssh public / private keypair
        **Access policy**: authenticated
      operationId: Generate
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.SSHKeyPair'
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Generate ssh keypair
      tags:
        - cloud_credentials
components:
  schemas:
    models.SSHKeyPair:
      properties:
        private:
          type: string
        public:
          type: string
      type: object
    models.CloudCredential:
      properties:
        created:
          example: 1650000000
          type: integer
        credentials:
          $ref: '#/components/schemas/models.CloudCredentialMap'
        id:
          example: 1
          type: integer
        name:
          example: test-env
          type: string
        provider:
          example: aws
          type: string
      type: object
    models.CloudCredentialMap:
      additionalProperties:
        type: string
      type: object
  requestBodies:
    Create:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              provider:
                description: cloud provider such as aws, aks, civo, digitalocean, etc.
                type: string
              name:
                description: name of the credentials such as rnd-test-credential
                type: string
              credentials:
                description: credentials in json format
                type: string
            required:
              - provider
              - name
              - credentials
      required: true
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: X-API-KEY
      type: apiKey
    jwt:
      in: header
      name: Authorization
      type: apiKey
