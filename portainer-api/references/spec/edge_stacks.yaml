openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage Edge Stacks
    name: edge_stacks
    x-displayName: Edge stacks
servers:
  - url: /api
paths:
  /edge_stacks:
    get:
      description: '**Access policy**: administrator'
      operationId: EdgeStackList
      parameters:
        - description: when true summarize the edge stack statuses in the StatusSummary field and void the Status field.
          in: query
          name: summarizeStatuses
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_http_handler_edgestacks.edgeStackListResponseItem'
                type: array
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Fetches the list of EdgeStacks
      tags:
        - edge_stacks
  /edge_stacks/{id}:
    delete:
      description: '**Access policy**: administrator'
      operationId: EdgeStackDelete
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Delete an EdgeStack
      tags:
        - edge_stacks
    get:
      description: '**Access policy**: administrator'
      operationId: EdgeStackInspect
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Inspect an EdgeStack
      tags:
        - edge_stacks
    put:
      description: '**Access policy**: administrator'
      operationId: EdgeStackUpdate
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_http_handler_edgestacks.updateEdgeStackPayload'
        description: EdgeStack data
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update an EdgeStack
      tags:
        - edge_stacks
  /edge_stacks/{id}/file:
    get:
      description: '**Access policy**: administrator'
      operationId: EdgeStackFile
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Stack file version maintained by Portainer. If both version and commitHash are provided, the commitHash will be used
          in: query
          name: version
          schema:
            type: integer
        - description: Git repository commit hash. If both version and commitHash are provided, the commitHash will be used
          in: query
          name: commitHash
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_http_handler_edgestacks.stackFileResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Fetches the stack file for an EdgeStack
      tags:
        - edge_stacks
  /edge_stacks/{id}/git:
    put:
      description: '**Access policy**: authenticated'
      operationId: edgeStackUpdateFromGit
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/edgestacks.stackGitUpdatePayload'
        description: Git configurations
        required: true
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update git configuration and pulls the repository
      tags:
        - edge_stacks
  /edge_stacks/{id}/helmRepo:
    put:
      description: '**Access policy**: administrator'
      operationId: edgeStackUpdateHelmRepository
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/edgestacks.updateEdgeStackHelmRepositoryPayload'
        description: Helm repository update configuration
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update an EdgeStack from a Helm repository
      tags:
        - edge_stacks
  /edge_stacks/{id}/logs/{endpoint_id}:
    delete:
      description: '**Access policy**: administrator'
      operationId: EdgeStackLogsDelete
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Endpoint Id
          in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deletes the available logs for a given edge stack and endpoint
      tags:
        - edge_stacks
    get:
      description: '**Access policy**: administrator'
      operationId: EdgeStackLogsStatusGet
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Environment Id
          in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Gets the status of the log collection for a given edgestack and environment
      tags:
        - edge_stacks
    put:
      description: '**Access policy**: administrator'
      operationId: EdgeStackLogsCollect
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Environment Id
          in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
        - description: Number of lines to request for the logs
          in: query
          name: tail
          schema:
            type: integer
        - description: Container Id
          in: query
          name: container_id
          schema:
            type: string
        - description: Start time to request for the logs
          in: query
          name: since
          schema:
            type: string
        - description: End time to request for the logs
          in: query
          name: until
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Schedule the collection of logs for a given endpoint and edge stack
      tags:
        - edge_stacks
  /edge_stacks/{id}/logs/{endpoint_id}/file:
    get:
      description: '**Access policy**: administrator'
      operationId: EdgeStackLogsDownload
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Endpoint Id
          in: path
          name: endpoint_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Downloads the available logs for a given edge stack and endpoint
      tags:
        - edge_stacks
  /edge_stacks/{id}/stagger/status:
    get:
      description: '**Access policy**: administrator'
      operationId: EdgeStackStaggerStatusInspect
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/edgestacks.edgeStackStaggerStatusResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Inspect an EdgeStack's parallel update status
      tags:
        - edge_stacks
  /edge_stacks/{id}/status:
    put:
      description: Authorized only if the request is done by an Edge Environment(Endpoint)
      operationId: EdgeStackStatusUpdate
      parameters:
        - description: EdgeStack Id
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_http_handler_edgestacks.updateStatusPayload'
        description: EdgeStack status payload
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad Request
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
      summary: Update an EdgeStack status
      tags:
        - edge_stacks
  /edge_stacks/create/file:
    post:
      description: '**Access policy**: administrator'
      operationId: EdgeStackCreateFile
      parameters:
        - description: if true, will not create an edge stack, but just will check the settings and return a non-persisted edge stack object
          in: query
          name: dryrun
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Name:
                  description: Name of the stack. it must only consist of lowercase alphanumeric characters, hyphens, or underscores as well as start with a letter or number
                  type: string
                file:
                  description: Content of the Stack file
                  type: string
                  format: binary
                EdgeGroups:
                  description: JSON stringified array of Edge Groups ids
                  type: string
                DeploymentType:
                  description: deploy type 0 - 'compose', 1 - 'kubernetes'
                  type: integer
                Registries:
                  description: JSON stringified array of Registry ids to use for this stack
                  type: string
                UseManifestNamespaces:
                  description: Uses the manifest's namespaces instead of the default one, relevant only for kube environments
                  type: boolean
                PrePullImage:
                  description: Pre Pull image
                  type: boolean
                RetryDeploy:
                  description: Retry deploy
                  type: boolean
                RetryPeriod:
                  description: Duration, in seconds, for which the agent should continue attempting to deploy the stack after a failure
                  type: integer
                Webhook:
                  description: unique webhook id
                  type: string
                EnvVars:
                  description: JSON stringified array of environment variables {name, value}
                  type: string
                StaggerConfig:
                  description: JSON stringified object of stagger config
                  type: string
              required:
                - Name
                - file
                - EdgeGroups
                - DeploymentType
                - Webhook
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad request
        '500':
          description: Internal server error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create an EdgeStack from file
      tags:
        - edge_stacks
  /edge_stacks/create/helmRepo:
    post:
      description: '**Access policy**: administrator'
      operationId: EdgeStackCreateHelmRepository
      parameters:
        - description: if true, will not create an edge stack, but just will check the settings and return a non-persisted edge stack object
          in: query
          name: dryrun
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/edgestacks.edgeStackFromHelmRepositoryPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad request
        '500':
          description: Internal server error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create an EdgeStack from a Helm repository
      tags:
        - edge_stacks
  /edge_stacks/create/repository:
    post:
      description: '**Access policy**: administrator'
      operationId: EdgeStackCreateRepository
      parameters:
        - description: if true, will not create an edge stack, but just will check the settings and return a non-persisted edge stack object
          in: query
          name: dryrun
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_http_handler_edgestacks.edgeStackFromGitRepositoryPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad request
        '409':
          description: Webhook ID already exists
        '500':
          description: Internal server error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create an EdgeStack from a git repository
      tags:
        - edge_stacks
  /edge_stacks/create/string:
    post:
      description: '**Access policy**: administrator'
      operationId: EdgeStackCreateString
      parameters:
        - description: if true, will not create an edge stack, but just will check the settings and return a non-persisted edge stack object
          in: query
          name: dryrun
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_http_handler_edgestacks.edgeStackFromStringPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.EdgeStack'
        '400':
          description: Bad request
        '500':
          description: Internal server error
        '503':
          description: Edge compute features are disabled
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Create an EdgeStack from a text
      tags:
        - edge_stacks
  /edge_stacks/parse_registries:
    post:
      description: '**Access policy**: authenticated'
      operationId: EdgeStackParseRegistries
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: stack file
                  type: string
                  format: binary
              required:
                - file
        required: true
      responses:
        '200':
          description: List of registries IDs
          content:
            application/json:
              schema:
                items:
                  type: integer
                type: array
        '400':
          description: Invalid request payload
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Parse registries from a stack file
      tags:
        - edge_stacks
components:
  schemas:
    portaineree.EdgeStack:
      properties:
        AlwaysCloneGitRepoForRelativePath:
          description: Whether the edge stack always clones the git repository for relative path
          example: false
          type: boolean
        AutoUpdate:
          allOf:
            - $ref: '#/components/schemas/portainer.AutoUpdateSettings'
          description: The GitOps update settings of a git stack
        CreatedBy:
          description: The username which created this stack
          example: admin
          type: string
        CreatedByUserId:
          description: The username id which created this stack
          example: '1'
          type: string
        CreationDate:
          description: StatusArray    map[EndpointID][]EdgeStackStatus `json:"StatusArray"`
          type: integer
        DeployerOptions:
          allOf:
            - $ref: '#/components/schemas/portaineree.EdgeStackDeployerOptions'
          description: Options to control the Deployer behaviour
        DeploymentType:
          $ref: '#/components/schemas/portainer.EdgeStackDeploymentType'
        EdgeGroups:
          items:
            type: integer
          type: array
        EdgeUpdateID:
          description: EdgeUpdateID represents the parent update ID, will be zero if this stack is not part of an update
          type: integer
        EntryPoint:
          type: string
        EnvVars:
          description: EnvVars is a list of environment variables to inject into the stack
          items:
            $ref: '#/components/schemas/portainer.Pair'
          type: array
        FilesystemPath:
          description: Local filesystem path
          example: /tmp
          type: string
        GitConfig:
          allOf:
            - $ref: '#/components/schemas/github_com_portainer_portainer-ee_api_git_types.RepoConfig'
          description: The git configuration of a git stack
        HelmConfig:
          allOf:
            - $ref: '#/components/schemas/portainer.HelmConfig'
          description: HelmConfig is the configuration for a Helm based deployment of an edge stack (Helm Chart)
        Id:
          description: EdgeStack Identifier
          example: 1
          type: integer
        ManifestPath:
          type: string
        Name:
          type: string
        NumDeployments:
          type: integer
        PerDeviceConfigsGroupMatchType:
          allOf:
            - $ref: '#/components/schemas/portainer.PerDevConfigsFilterType'
          description: Per device configs group match type
          enum:
            - file
            - ' dir'
          example: file
        PerDeviceConfigsMatchType:
          allOf:
            - $ref: '#/components/schemas/portainer.PerDevConfigsFilterType'
          description: Per device configs match type
          enum:
            - file
            - ' dir'
          example: file
        PerDeviceConfigsPath:
          description: Per device configs path
          example: configs
          type: string
        PrePullImage:
          description: Pre Pull Image
          type: boolean
        PreviousDeploymentInfo:
          allOf:
            - $ref: '#/components/schemas/portainer.StackDeploymentInfo'
          description: PreviousDeploymentInfo represents the previous deployment info of the stack
        ProjectPath:
          type: string
        RePullImage:
          description: |-
            Deprecated(2.36): keep it for backward compatibility. To remove in future versions (2.44+)
            Re-Pull Image
          type: boolean
        Registries:
          items:
            type: integer
          type: array
        RetryDeploy:
          description: Retry deploy
          example: false
          type: boolean
        RetryPeriod:
          description: RetryPeriod specifies the duration, in seconds, for which the agent should continue attempting to deploy the stack after a failure
          type: integer
        ScheduledTime:
          description: Schedule represents the schedule of the Edge stack (optional, format - 'YYYY-MM-DD HH:mm:ss')
          example: '2020-11-13 14:53:00'
          type: string
        StackFileVersion:
          description: StackFileVersion represents the version of the stack file, such yaml, hcl, manifest file
          example: 1
          type: integer
        StaggerConfig:
          allOf:
            - $ref: '#/components/schemas/portaineree.EdgeStaggerConfig'
          description: StaggerConfig is the configuration for staggered update
        Status:
          additionalProperties:
            $ref: '#/components/schemas/portainer.EdgeStackStatus'
          type: object
        SupportPerDeviceConfigs:
          description: Whether the edge stack supports per device configs
          example: false
          type: boolean
        SupportRelativePath:
          description: Whether the stack supports relative path volume
          example: false
          type: boolean
        UseManifestNamespaces:
          description: Uses the manifest's namespaces instead of the default one
          type: boolean
        Version:
          type: integer
        Webhook:
          description: A UUID to identify a webhook. The stack will be force updated and pull the latest image when the webhook was invoked.
          example: c11fdf23-183e-428a-9bb6-16db01032174
          type: string
      type: object
    github_com_portainer_portainer-ee_api_http_handler_edgestacks.edgeStackFromStringPayload:
      properties:
        DeploymentType:
          allOf:
            - $ref: '#/components/schemas/portainer.EdgeStackDeploymentType'
          description: |-
            Deployment type to deploy this stack
            Valid values are: 0 - 'compose', 1 - 'kubernetes'
            compose is enabled only for docker environments
            kubernetes is enabled only for kubernetes environments
          enum:
            - 0
            - 1
          example: 0
        EdgeGroups:
          description: List of identifiers of EdgeGroups
          example:
            - 1
          items:
            type: integer
          type: array
        EnvVars:
          description: List of environment variables
          items:
            $ref: '#/components/schemas/portainer.Pair'
          type: array
        Name:
          description: |-
            Name of the stack
            Max length: 255
            Name must only contains lowercase characters, numbers, hyphens, or underscores
            Name must start with a lowercase character or number
            Example: stack-name or stack_123 or stackName
          example: stack-name
          type: string
        PrePullImage:
          description: Pre Pull image
          example: false
          type: boolean
        Registries:
          description: List of Registries to use for this stack
          items:
            type: integer
          type: array
        RetryDeploy:
          description: Retry deploy
          example: false
          type: boolean
        RetryPeriod:
          description: Retry period specifies the duration, in seconds, for which the agent should continue attempting to deploy the stack after a failure
          type: integer
        StackFileContent:
          description: Content of the Stack file
          example: |-
            version: 3
             services:
             web:
             image:nginx
          type: string
        StaggerConfig:
          allOf:
            - $ref: '#/components/schemas/portaineree.EdgeStaggerConfig'
          description: Configuration for stagger updates
        UseManifestNamespaces:
          description: Uses the manifest's namespaces instead of the default one
          type: boolean
        Webhook:
          description: Optional webhook configuration
          example: c11fdf23-183e-428a-9bb6-16db01032174
          type: string
      required:
        - Name
        - StackFileContent
      type: object
    github_com_portainer_portainer-ee_api_http_handler_edgestacks.edgeStackFromGitRepositoryPayload:
      properties:
        AlwaysCloneGitRepoForRelativePath:
          description: Whether the edge stack always clones the git repository for relative path
          example: false
          type: boolean
        AutoUpdate:
          allOf:
            - $ref: '#/components/schemas/portainer.AutoUpdateSettings'
          description: Optional GitOps update configuration
        CreatedFromCustomTemplateID:
          description: CreatedFromCustomTemplateID used to determine whether the edge stack is created from a custom template
          type: integer
        DeploymentType:
          allOf:
            - $ref: '#/components/schemas/portainer.EdgeStackDeploymentType'
          description: |-
            Deployment type to deploy this stack
            Valid values are: 0 - 'compose', 1 - 'kubernetes'
            compose is enabled only for docker environments
            kubernetes is enabled only for kubernetes environments
          enum:
            - 0
            - 1
          example: 0
        EdgeGroups:
          description: List of identifiers of EdgeGroups
          example:
            - 1
          items:
            type: integer
          type: array
        EnvVars:
          description: List of environment variables
          items:
            $ref: '#/components/schemas/portainer.Pair'
          type: array
        FilePathInRepository:
          default: docker-compose.yml
          description: Path to the Stack file inside the Git repository
          example: docker-compose.yml
          type: string
        FilesystemPath:
          description: Local filesystem path
          example: /mnt
          type: string
        HelmConfig:
          allOf:
            - $ref: '#/components/schemas/edgestacks.gitHelmConfig'
          description: |-
            HelmConfig is the optional Helm configuration for deploying a chart from within the git repository.
            Omit this field for non-Helm git stacks.
        Name:
          description: |-
            Name of the stack
            Max length: 255
            Name must only contains lowercase characters, numbers, hyphens, or underscores
            Name must start with a lowercase character or number
            Example: stack-name or stack_123 or stackName
          example: stack-name
          type: string
        PerDeviceConfigsGroupMatchType:
