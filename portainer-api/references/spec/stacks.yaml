openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: Portainer API (preamble stripped — see SKILL.md)
  title: PortainerEE API
  version: 2.42.0
tags:
  - description: Manage stacks
    name: stacks
    x-displayName: Stacks
servers:
  - url: /api
paths:
  /edge_stacks/webhooks/{webhookID}:
    post:
      description: '**Access policy**: public'
      operationId: EdgeStackWebhookInvoke
      parameters:
        - description: Stack identifier
          in: path
          name: webhookID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '409':
          description: Conflict
        '500':
          description: Server error
      summary: Webhook for triggering edge stack updates from git
      tags:
        - stacks
  /stacks:
    get:
      description: |-
        List all stacks based on the current user authorizations.
        Will return all stacks if using an administrator account otherwise it
        will only return the list of stacks the user have access to.
        Limited stacks will not be returned by this endpoint.
        **Access policy**: authenticated
      operationId: StackList
      parameters:
        - description: 'Filters to process on the stack list. Encoded as JSON (a map[string]string). For example, {''SwarmID'': ''jpofkc0i9uo9wtx1zesuk649w''} will only return stacks that are part of the specified Swarm cluster. Available filters: EndpointID, SwarmID.'
          in: query
          name: filters
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/portaineree.Stack'
                type: array
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: List stacks
      tags:
        - stacks
  /stacks/{id}:
    delete:
      description: |-
        Remove a stack.
        **Access policy**: restricted
      operationId: StackDelete
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Set to true to delete an external stack. Only external Swarm stacks are supported
          in: query
          name: external
          schema:
            type: boolean
        - description: Set to true to delete named volumes declared in the stack file and anonymous volumes attached to containers. Only affects Docker Standalone stacks.
          in: query
          name: removeVolumes
          schema:
            type: boolean
        - description: Environment identifier
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Remove a stack
      tags:
        - stacks
    get:
      description: |-
        Retrieve details about a stack.
        **Access policy**: restricted
      operationId: StackInspect
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Stack not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Inspect a stack
      tags:
        - stacks
    put:
      description: |-
        Update a stack, only for file based stacks.
        **Access policy**: authenticated
      operationId: StackUpdate
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Environment identifier
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.updateStackPayload'
        description: Stack details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '409':
          description: Conflict
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update a stack
      tags:
        - stacks
  /stacks/{id}/associate:
    put:
      description: '**Access policy**: administrator'
      operationId: StackAssociate
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Environment identifier
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
        - description: Swarm identifier
          in: query
          name: swarmId
          required: true
          schema:
            type: integer
        - description: Indicates whether the stack is orphaned
          in: query
          name: orphanedRunning
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Stack not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Associate an orphaned stack to a new environment(endpoint)
      tags:
        - stacks
  /stacks/{id}/convert:
    post:
      description: |-
        Convert a Docker Compose or Docker Swarm stack to Kubernetes manifests or Helm chart and return the results for preview.
        **Access policy**: authenticated
      operationId: StackConvert
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.stackConvertPayload'
        description: Stack conversion details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stacks.stackConvertResponse'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Stack not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Convert a Docker Compose stack to Kubernetes manifests or Helm chart
      tags:
        - stacks
  /stacks/{id}/file:
    get:
      description: |-
        Get Stack file content.
        **Access policy**: restricted
      operationId: StackFileInspect
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Stack file version maintained by Portainer. If both version and commitHash are provided, the commitHash will be used
          in: query
          name: version
          schema:
            type: integer
        - description: Git repository commit hash. If both version and commitHash are provided, the commitHash will be used
          in: query
          name: commitHash
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stacks.stackFileResponse'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Stack not found
        '409':
          description: Git settings changed, redeploy required
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Retrieve the content of the Stack file for the specified stack
      tags:
        - stacks
  /stacks/{id}/git:
    post:
      description: |-
        Update the Git settings in a stack, e.g., RepositoryReferenceName and AutoUpdate
        **Access policy**: authenticated
      operationId: StackUpdateGit
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Stacks created before version 1.18.0 might not have an associated environment(endpoint) identifier. Use this optional parameter to set the environment(endpoint) identifier used by the stack.
          in: query
          name: endpointId
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.stackGitUpdatePayload'
        description: Git configs for pull and redeploy a stack
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Update a stack's Git configs
      tags:
        - stacks
  /stacks/{id}/git/redeploy:
    put:
      description: |-
        Pull and redeploy a stack via Git
        **Access policy**: authenticated
      operationId: StackGitRedeploy
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Stacks created before version 1.18.0 might not have an associated environment(endpoint) identifier. Use this optional parameter to set the environment(endpoint) identifier used by the stack.
          in: query
          name: endpointId
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.stackGitRedeployPayload'
        description: Git configs for pull and redeploy of a stack. **StackName** may only be populated for Kuberenetes stacks, and if specified with a blank string, it will be set to blank
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '409':
          description: Conflict
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Redeploy a stack
      tags:
        - stacks
  /stacks/{id}/images_status:
    get:
      description: '**Access policy**:'
      operationId: stackImagesStatus
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Refresh will force a refresh of the image status cache
          in: query
          name: refresh
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/images.StatusResponse'
        '400':
          description: Bad request
        '500':
          description: Internal server error
      security:
        - jwt: []
      summary: Fetch image status for stack
      tags:
        - stacks
  /stacks/{id}/migrate:
    post:
      description: |-
        Migrate a stack from an environment(endpoint) to another environment(endpoint). It will re-create the stack inside the target environment(endpoint) before removing the original stack.
        **Access policy**: authenticated
      operationId: StackMigrate
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Stacks created before version 1.18.0 might not have an associated environment(endpoint) identifier. Use this optional parameter to set the environment(endpoint) identifier used by the stack.
          in: query
          name: endpointId
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.stackMigratePayload'
        description: Stack migration details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Stack not found
        '409':
          description: A stack with the same name is already running on the target environment(endpoint)
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Migrate a stack to another environment(endpoint)
      tags:
        - stacks
  /stacks/{id}/start:
    post:
      description: |-
        Starts a stopped Stack.
        **Access policy**: authenticated
      operationId: StackStart
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Environment identifier
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '409':
          description: Stack is already active, deploying, or in error state
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Starts a stopped Stack
      tags:
        - stacks
  /stacks/{id}/stop:
    post:
      description: |-
        Stops a stopped Stack.
        **Access policy**: authenticated
      operationId: StackStop
      parameters:
        - description: Stack identifier
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Environment identifier
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '409':
          description: Conflict
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Stops a stopped Stack
      tags:
        - stacks
  /stacks/create/kubernetes/repository:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateKubernetesGit
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.kubernetesGitDeploymentPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '409':
          description: Webhook ID already exists
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new kubernetes stack from a git repository
      tags:
        - stacks
  /stacks/create/kubernetes/string:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateKubernetesFile
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.kubernetesStringDeploymentPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new kubernetes stack from a file
      tags:
        - stacks
  /stacks/create/kubernetes/url:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateKubernetesUrl
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.kubernetesManifestURLDeploymentPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new kubernetes stack from a url
      tags:
        - stacks
  /stacks/create/standalone/file:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateDockerStandaloneFile
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Name:
                  description: Name of the stack
                  type: string
                Env:
                  description: 'Environment variables passed during deployment, represented as a JSON array [{''name'': ''name'', ''value'': ''value''}].'
                  type: string
                file:
                  description: Stack file
                  type: string
                  format: binary
              required:
                - Name
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new compose stack from a file
      tags:
        - stacks
  /stacks/create/standalone/repository:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateDockerStandaloneRepository
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.composeStackFromGitRepositoryPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new compose stack from repository
      tags:
        - stacks
  /stacks/create/standalone/string:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateDockerStandaloneString
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.composeStackFromFileContentPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new compose stack from a text
      tags:
        - stacks
  /stacks/create/swarm/file:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateDockerSwarmFile
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Name:
                  description: Name of the stack
                  type: string
                SwarmID:
                  description: Swarm cluster identifier.
                  type: string
                Env:
                  description: 'Environment variables passed during deployment, represented as a JSON array [{''name'': ''name'', ''value'': ''value''}]. Optional'
                  type: string
                file:
                  description: Stack file
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '409':
          description: Stack name or webhook id is not unique
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new swarm stack from a file
      tags:
        - stacks
  /stacks/create/swarm/repository:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateDockerSwarmRepository
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.swarmStackFromGitRepositoryPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '409':
          description: Stack name or webhook id is not unique
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new swarm stack from a git repository
      tags:
        - stacks
  /stacks/create/swarm/string:
    post:
      description: |-
        Deploy a new stack into a Docker environment specified via the environment identifier.
        **Access policy**: authenticated
      operationId: StackCreateDockerSwarmString
      parameters:
        - description: Identifier of the environment that will be used to deploy the stack
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stacks.swarmStackFromFileContentPayload'
        description: stack config
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Stack'
        '400':
          description: Invalid request
        '409':
          description: Stack name or webhook id is not unique
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Deploy a new swarm stack from a text
      tags:
        - stacks
  /stacks/name/{name}:
    delete:
      description: |-
        Remove a stack.
        **Access policy**: restricted
      operationId: StackDeleteKubernetesByName
      parameters:
        - description: Stack name
          in: path
          name: name
          required: true
          schema:
            type: string
        - description: Set to true to delete an external stack. Only external Swarm stacks are supported
          in: query
          name: external
          schema:
            type: boolean
        - description: Environment identifier
          in: query
          name: endpointId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '404':
          description: Not found
        '500':
          description: Server error
      security:
        - ApiKeyAuth: []
        - jwt: []
      summary: Remove Kubernetes stacks by name
      tags:
        - stacks
  /stacks/webhooks/{webhookID}:
    post:
      description: '**Access policy**: public'
      operationId: StacksWebhookInvoke
      parameters:
        - description: Stack identifier
          in: path
          name: webhookID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '409':
          description: Autoupdate for the stack isn't available" or "Stack deployment is already in progress
        '500':
          description: Server error
      summary: Webhook for triggering stack updates from git
      tags:
        - stacks
components:
  schemas:
    portaineree.Stack:
      properties:
        AdditionalFiles:
          description: Only applies when deploying stack with multiple files
          items:
            type: string
          type: array
        AutoUpdate:
          allOf:
